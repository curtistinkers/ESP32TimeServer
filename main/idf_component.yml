# Multi-version component manager manifest map
dependencies:
  # Static dependencies required across all compilation target profiles
  esp-idf-lib/hd44780: "^1.3.0"
  esp-idf-lib/pcf8574: "^1.0.10"

  # Core framework rules block using isolated map array items
  espressif/arduino-esp32:
    version: "^3.3.7"
    rules:
      - if: "idf_version >= 6.0.0"
        version: ">=4.0.0-alpha1"
