dependencies:
  # Global static dependencies required by both framework generations
  esp-idf-lib/hd44780: "^1.3.0"
  esp-idf-lib/pcf8574: "^1.0.10"

  # Conditional dependency mapping for the core framework abstraction layer
  espressif/arduino-esp32:
    rules:
      # 1. This rule handles compilation when running on modern ESP-IDF v6
      - version: ">=4.0.0-alpha1"
        if: "idf_version >= 6.0.0"

      # 2. This rule handles compilation fallback for your stable ESP-IDF v5.5 builds
      - version: "^3.3.7"
        if: "idf_version < 6.0.0"
