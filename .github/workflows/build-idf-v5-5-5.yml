name: Build ESP32TimeServer (ESP-IDF v5.5.5)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-v555:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository From Scratch
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Clean Compile with ESP-IDF v5.5.5
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.5.5
        target: esp32p4
        command: |
          idf.py fullclean
          idf.py build

    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ESP32TimeServer-v5.5.5-Binary
        path: build\ESP32TimeServer.bin
