name: Build ESP32TimeServer (ESP-IDF v5.5.5)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-v555:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository From Scratch
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup Compiler Cache (ccache)
      uses: actions/cache@v4
      with:
        path: .ccache
        key: esp32p4-v5.5.5-ccache-${{ github.run_id }}
        restore-keys: |
          esp32p4-v5.5.5-ccache-

    - name: Clean Compile with ESP-IDF v5.5.5
      uses: espressif/esp-idf-ci-action@v1
      env:
        # Maps the runner folder to the workspace to make caching tracking persistent
        CCACHE_DIR: ${{ github.workspace }}/.ccache
      with:
        esp_idf_version: v5.5.5
        target: esp32p4
        command: |
          idf.py --ccache build

