name: Build ESP32TimeServer (ESP-IDF v6.0.2)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-v602:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository From Scratch
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup Compiler Cache (ccache)
      uses: actions/cache@v4
      with:
        path: .ccache
        key: esp32p4-v6.0.2-ccache-${{ github.run_id }}
        restore-keys: |
          esp32p4-v6.0.2-ccache-

    - name: Clean Compile with ESP-IDF v6.0.2
      uses: espressif/esp-idf-ci-action@v1
      env:
        CCACHE_DIR: ${{ github.workspace }}/.ccache
      with:
        esp_idf_version: v6.0.2
        target: esp32p4
        command: |
          idf.py --ccache build

    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ESP32TimeServer-v6.0.2-Binary
        path: build/ESP32TimeServer.bin
